    /* NUEVA PALETA ARMÓNICA: TEAL + CORAL + CREMA */
    body {

        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
        background-color: #0f172a;
        color: #e2e8f0;
    }

    .game-card { 
        background: #1e293b; 
        width: 95%; 
        max-width: 500px; 
        padding: 20px; 
        border-radius: 12px; 
        text-align: center; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        border: 1px solid #334155;
    }
    
    h2 { 
        margin: 0 0 15px 0; 
        font-size: 18px; 
        font-weight: 500; 
        color: #f8fafc; 
    }

    /* PALABRAS Y OPCIONES */
    .word, .option-btn { 
        display: inline-block; 
        margin: 3px; 
        padding: 10px 14px; 
        cursor: pointer; 
        border-radius: 6px; 
        font-weight: 600; 
        font-size: 14px; 
        border: 1px solid #475569;
        background: #334155;
        color: #e2e8f0;
        transition: all 0.2s;
    }

    .word:hover, .option-btn:hover { 
        background: #475569; 
        border-color: #2dd4bf;
    }

    /* ESTADOS */
    .correct { 
        background: #14b8a6 !important;
        color: white !important; 
        border-color: #2dd4bf !important; 
    }

    .wrong { 
        background: #f43f5e !important;
        color: white !important; 
        border-color: #fb7185 !important; 
    }

    /* ZONA RESPUESTA */
    #answer-zone { 
        min-height: 50px; 
        margin: 15px 0; 
        padding: 10px; 
        border-radius: 8px; 
        font-size: 19px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        flex-wrap: wrap; 
        gap: 6px; 
        background: #0f172a;
        border: 1px solid #2dd4bf;
        color: #2dd4bf;
    }
    
    /* BOTONES */
    .controls { 
        display: flex; 
        gap: 8px; 
        justify-content: center; 
        margin-top: 15px; 
    }

    button { 
        padding: 10px 18px; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 13px; 
        color: #0f172a;
        transition: transform 0.1s;
    }

    button:active { transform: scale(0.95); }

    .undo-btn { background: #94a3b8; }
    .check-btn { background: #2dd4bf; }
    .next-btn { background: #fda4af; }

    /* INFO BOX */
    #info-box { 
        margin-top: 15px; 
        padding: 15px; 
        border-radius: 8px; 
        display: none; 
        text-align: left; 
        font-size: 14px; 
        background: rgba(15, 23, 42, 0.6); 
        border: 1px solid #334155;
    }

    .verb-highlight { 
        color: #2dd4bf; 
        font-weight: bold; 
        margin-top: 4px; 
    }

    .grammar-note { 
        font-size: 12px; 
        color: #94a3b8; 
        border-top: 1px solid #334155; 
        padding-top: 8px; 
        margin-top: 8px; 
    }
    </style>
</head>

  "s": "Hoy vas un poco tarde a la escuela",
  "g": "Dativo de dirección (-a/e)",
  "v": "gitmek: ir",
  "h": "okula",
  "alt": ["okulda", "tuzluca", "mavi"]
},
{
  "c": "O kalın kitabı dikkatlice okuyor",
  "s": "Lee el libro grueso con atención",
  "g": "Acusativo definido (-ı/i) y adverbio de modo (-ce/ca)",
  "v": "okumak: leer",
  "h": "kitabı",
  "alt": ["kitaba", "bulutça", "pahalının"]
},
  {
  "c": "Biz akşam lezzetli yemeği birlikte yiyoruz",
  "s": "Cenamos comida deliciosa juntos",
  "g": "Acusativo definido (-ı/i/u/ü) con mutación consonántica (k > ğ)",
  "v": "yemek: comer/cenar",
  "h": "yemeği",
  "alt": ["yemeğe", "tuzluca", "ekşi"]
}
];


function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "tr-TR";
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

function loadNewGame() {
    currentIdx = Math.floor(Math.random() * sentences.length);
    gameMode = Math.random() > 0.5 ? "order" : "fill";
    renderGame();
}

function renderGame() {
    locked = false;
    userWords = [];
    const item = sentences[currentIdx];
    
    document.getElementById('words-container').innerHTML = "";
    document.getElementById('answer-zone').innerHTML = "";
    document.getElementById('options-container').innerHTML = "";
    document.getElementById('info-box').style.display = "none";
    
    if (gameMode === "order") {
        document.getElementById('game-title').innerText = "Cümleyi düzenle";
        document.getElementById('undo-btn').style.display = "inline-block";
        document.getElementById('check-btn').style.display = "inline-block";

        let shuffled = [...item.c.split(" ")].sort(() => Math.random() - 0.5);
        shuffled.forEach(w => {
            let span = document.createElement('div');
            span.className = 'word';
            span.innerText = w;
            span.onclick = () => {
                if(!locked) {
                    userWords.push(w);
                    span.style.display = "none";
                    document.getElementById('answer-zone').innerText = userWords.join(" ");
                }
            };
            document.getElementById('words-container').appendChild(span);
        });
    } else {
        document.getElementById('game-title').innerText = "Boşluğu doldur";
        document.getElementById('undo-btn').style.display = "none";
        document.getElementById('check-btn').style.display = "none";
        
        document.getElementById('answer-zone').innerText = item.c.replace(item.h, "_______");

        let options = [...item.alt, item.h].sort(() => Math.random() - 0.5);
        options.forEach(opt => {
            let btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectOption(opt, btn);
            document.getElementById('options-container').appendChild(btn);
        });
    }
}

function selectOption(selected, btnElement) {
    if (locked) return;
    locked = true;
    const item = sentences[currentIdx];
    document.getElementById('answer-zone').innerText = item.c;
    document.querySelectorAll('.option-btn').forEach(b => {
        if (b.innerText === item.h) b.classList.add('correct');
        else if (b === btnElement && selected !== item.h) b.classList.add('wrong');
    });
    showResult(selected === item.h);
}

function check() {
    if (userWords.length === 0 || locked) return;
    locked = true;
    const item = sentences[currentIdx];
    showResult(userWords.join(" ").toLowerCase() === item.c.toLowerCase());
}

function showResult(isCorrect) {
    const item = sentences[currentIdx];
    const msg = document.getElementById('result-msg');
    msg.innerText = isCorrect ? "✔ Doğru!" : "✘ Yanlış!";
    msg.style.color = isCorrect ? "#14b8a6" : "#f43f5e";
    document.getElementById('correct-text').innerText = item.c;
    document.getElementById('trans-text').innerText = item.s;
    document.getElementById('verb-text').innerText = "📖 " + item.v;
    document.getElementById('grammar-text').innerText = "💡 " + item.g;
    document.getElementById('info-box').style.display = "block";
    speak(item.c);
}

function resetCurrent() { renderGame(); }

loadNewGame();
</script>
